services:
  mysql:
    image: mysql:8.0
    container_name: kiemtra01_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d

  postgres:
    image: postgres:16
    container_name: kiemtra01_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d

  laptop_service:
    build: ./services/laptop_service
    container_name: kiemtra01_laptop
    hostname: laptop-service
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: laptop_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      STAFF_API_KEY: ${STAFF_API_KEY:-dev-staff-key}
    depends_on:
      - postgres
    ports:
      - "8001:8000"

  mobile_service:
    build: ./services/mobile_service
    container_name: kiemtra01_mobile
    hostname: mobile-service
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: mobile_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      STAFF_API_KEY: ${STAFF_API_KEY:-dev-staff-key}
    depends_on:
      - postgres
    ports:
      - "8002:8000"

  accessory_service:
    build: ./services/accessory_service
    container_name: kiemtra01_accessory
    hostname: accessory-service
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: accessory_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      STAFF_API_KEY: ${STAFF_API_KEY:-dev-staff-key}
    depends_on:
      - postgres
    ports:
      - "8004:8000"

  customer_service:
    build: ./services/customer_service
    container_name: kiemtra01_customer
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${CUSTOMER_MYSQL_DATABASE:-customer_db}
      MYSQL_USER: ${CUSTOMER_MYSQL_USER:-customer_user}
      MYSQL_PASSWORD: ${CUSTOMER_MYSQL_PASSWORD:-customer_password}
      LAPTOP_SERVICE_URL: http://laptop-service:8000
      MOBILE_SERVICE_URL: http://mobile-service:8000
      ACCESSORY_SERVICE_URL: http://accessory-service:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
    depends_on:
      - mysql
      - laptop_service
      - mobile_service
      - accessory_service
    ports:
      - "8000:8000"

  staff_service:
    build: ./services/staff_service
    container_name: kiemtra01_staff
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${STAFF_MYSQL_DATABASE:-staff_db}
      MYSQL_USER: ${STAFF_MYSQL_USER:-staff_user}
      MYSQL_PASSWORD: ${STAFF_MYSQL_PASSWORD:-staff_password}
      LAPTOP_SERVICE_URL: http://laptop-service:8000
      MOBILE_SERVICE_URL: http://mobile-service:8000
      ACCESSORY_SERVICE_URL: http://accessory-service:8000
      STAFF_API_KEY: ${STAFF_API_KEY:-dev-staff-key}
    depends_on:
      - mysql
      - laptop_service
      - mobile_service
      - accessory_service
    ports:
      - "8003:8000"

volumes:
  mysql_data:
  postgres_data:
