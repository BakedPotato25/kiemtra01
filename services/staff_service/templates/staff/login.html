<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Login</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="staff-login-page">
  <section class="login-card staff-login-card">
    <h1>Staff Login</h1>
    <p>Manage laptop, mobile, and accessory items across product services.</p>
    {% include 'partials/messages.html' %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Sign In</button>
    </form>
    <p class="auth-switch">Need an account? <a href="/staff/register/">Create staff account</a></p>
  </section>
</body>
</html>
